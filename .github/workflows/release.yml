name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: release
        uses: googleapis/release-please-action@v5

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.release.outputs.prs_created == 'true'
        with:
          fetch-depth: 0

      - name: Set up Node
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Sync release PR payloads
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail

          # docs-site reference pages embed the plugin version, so the release
          # branch needs them regenerated alongside the version bump (below).
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

          release_prs="${RELEASE_PRS:-[]}"
          if [ -z "$release_prs" ] || [ "$release_prs" = "null" ]; then
            release_prs="[]"
          fi

          if ! printf '%s' "$release_prs" | jq -e 'type == "array"' >/dev/null; then
            echo "::error::Release Please prs output is not a JSON array."
            exit 1
          fi

          if [ "$(printf '%s' "$release_prs" | jq 'length')" -eq 0 ]; then
            echo "::error::Release Please reported prs_created=true but returned no PR metadata."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          printf '%s\n' "$release_prs" | jq -c '.[]' | while IFS= read -r pr; do
            pr_number=$(printf '%s' "$pr" | jq -r '.number')
            branch=$(printf '%s' "$pr" | jq -r '.headBranchName // .headRefName // empty')
            title=$(printf '%s' "$pr" | jq -r '.title')

            if [ -z "$pr_number" ] || [ "$pr_number" = "null" ] || [ -z "$branch" ]; then
              echo "::error::Release Please PR metadata is missing number or head branch: ${pr}"
              exit 1
            fi

            echo "Syncing generated payloads for PR #${pr_number} (${branch})."
            git fetch origin "$branch"
            git switch --detach "origin/${branch}"

            bash scripts/build-plugin-payloads.sh
            bash scripts/sync-marketplace-versions.sh
            # reference:generate is a pure node: built-in script — no node_modules needed.
            pnpm --dir docs-site reference:generate

            if git diff --quiet -- dist .claude-plugin/marketplace.json .agents/plugins/marketplace.json docs-site/src/content/docs/reference; then
              echo "Payloads already current for PR #${pr_number}."
            else
              git add dist .claude-plugin/marketplace.json .agents/plugins/marketplace.json docs-site/src/content/docs/reference
              git commit -m "chore(speckit-pro): sync release payloads, marketplace versions, and docs reference"
              git push origin "HEAD:${branch}"
            fi

            gh workflow run pr-checks.yml \
              --ref "$branch" \
              -f pr_number="$pr_number" \
              -f pr_title="$title" \
              -f base_ref="main"
          done

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'

      - name: Build clean plugin payloads
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: bash scripts/build-plugin-payloads.sh

      - name: Sync marketplace versions
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: bash scripts/sync-marketplace-versions.sh

      - name: Set up Node
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Regenerate docs reference
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.25.0 --activate
          # reference:generate is a pure node: built-in script — no node_modules needed.
          pnpm --dir docs-site reference:generate

      - name: Verify release artifacts are consistent
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: |
          set -euo pipefail

          # The release PR's payload-sync step already committed dist, marketplace
          # versions, and the docs reference, so main is already consistent after
          # the merge — there is intentionally NO separate follow-up sync PR.
          # This step only VERIFIES that invariant and fails loudly if it drifts.
          if git diff --quiet -- dist .claude-plugin/marketplace.json .agents/plugins/marketplace.json docs-site/src/content/docs/reference; then
            echo "Release artifacts are consistent; the release PR carried the full sync. No follow-up PR needed."
            exit 0
          fi

          echo "::error::Release artifacts drifted after publishing. The release PR's payload-sync step should have committed dist/, both marketplace.json files, and the docs reference, but a clean rebuild here differs — usually because the payload-sync step did not run on the release PR. Re-run the Release workflow (workflow_dispatch) to re-sync the release PR before merging next time. Drift:"
          git --no-pager diff --stat -- dist .claude-plugin/marketplace.json .agents/plugins/marketplace.json docs-site/src/content/docs/reference
          exit 1
