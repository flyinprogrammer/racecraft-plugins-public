name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: release
        uses: googleapis/release-please-action@v5

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.release.outputs.prs_created == 'true'
        with:
          fetch-depth: 0

      - name: Sync release PR payloads
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail

          release_prs="${RELEASE_PRS:-[]}"
          if [ -z "$release_prs" ] || [ "$release_prs" = "null" ]; then
            release_prs="[]"
          fi

          if ! printf '%s' "$release_prs" | jq -e 'type == "array"' >/dev/null; then
            echo "::error::Release Please prs output is not a JSON array."
            exit 1
          fi

          if [ "$(printf '%s' "$release_prs" | jq 'length')" -eq 0 ]; then
            echo "::error::Release Please reported prs_created=true but returned no PR metadata."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          printf '%s\n' "$release_prs" | jq -c '.[]' | while IFS= read -r pr; do
            pr_number=$(printf '%s' "$pr" | jq -r '.number')
            branch=$(printf '%s' "$pr" | jq -r '.headBranchName // .headRefName // empty')
            title=$(printf '%s' "$pr" | jq -r '.title')

            if [ -z "$pr_number" ] || [ "$pr_number" = "null" ] || [ -z "$branch" ]; then
              echo "::error::Release Please PR metadata is missing number or head branch: ${pr}"
              exit 1
            fi

            echo "Syncing generated payloads for PR #${pr_number} (${branch})."
            git fetch origin "$branch"
            git switch --detach "origin/${branch}"

            bash scripts/build-plugin-payloads.sh

            if git diff --quiet -- dist; then
              echo "Payloads already current for PR #${pr_number}."
            else
              git add dist
              git commit -m "chore(speckit-pro): sync release payloads"
              git push origin "HEAD:${branch}"
            fi

            gh workflow run pr-checks.yml \
              --ref "$branch" \
              -f pr_number="$pr_number" \
              -f pr_title="$title" \
              -f base_ref="main"
          done

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'

      - name: Build clean plugin payloads
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: bash scripts/build-plugin-payloads.sh

      - name: Sync marketplace versions
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: bash scripts/sync-marketplace-versions.sh

      - name: Open payload and marketplace sync PR
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if git diff --quiet -- dist .claude-plugin/marketplace.json .agents/plugins/marketplace.json; then
            echo "No payload or marketplace sync changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          version=$(jq -r '.version' speckit-pro/.claude-plugin/plugin.json)
          sync_branch="release/sync-speckit-pro-v${version}"
          sync_title="chore: sync plugin payloads and marketplace versions"

          git switch -c "$sync_branch"
          git add dist .claude-plugin/marketplace.json .agents/plugins/marketplace.json
          git commit -m "$sync_title"
          git push --force origin "HEAD:${sync_branch}"

          body_file="$(mktemp)"
          cat > "$body_file" <<'BODY'
          ## Summary
          - Sync generated plugin payloads and marketplace versions after a release.
          - Created by the Release workflow because `main` is protected.

          ## Validation
          - `bash scripts/build-plugin-payloads.sh`
          - `bash scripts/sync-marketplace-versions.sh`
          BODY

          pr_number=$(gh pr list \
            --state open \
            --base main \
            --head "$sync_branch" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$sync_title" --body-file "$body_file"
          else
            gh pr create --base main --head "$sync_branch" --title "$sync_title" --body-file "$body_file"
          fi
