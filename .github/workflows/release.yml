name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: release
        uses: googleapis/release-please-action@v5

      - uses: actions/checkout@v6
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'

      - name: Build clean plugin payloads
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: bash scripts/build-plugin-payloads.sh

      - name: Sync marketplace versions
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: bash scripts/sync-marketplace-versions.sh

      - name: Commit and push payload and marketplace sync
        if: steps.release.outputs['speckit-pro--release_created'] == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- dist .claude-plugin/marketplace.json .agents/plugins/marketplace.json; then
            git add dist .claude-plugin/marketplace.json .agents/plugins/marketplace.json
            git commit -m "chore: sync plugin payloads and marketplace versions [skip ci]"
            git push
          fi
