name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-docs.yml"
      - ".github/workflows/pr-checks.yml"
      - ".github/workflows/release.yml"
      - "docs-site/**"
      - "docs/prd-interactive-documentation.md"
      - "docs/roadmap-interactive-documentation.md"
      - ".specify/integrations/**"
      - ".claude-plugin/marketplace.json"
      - ".agents/plugins/marketplace.json"
      - "README.md"
      - "scripts/**"
      - "release-please-config.json"
      - ".release-please-manifest.json"
      - "speckit-pro/.claude-plugin/plugin.json"
      - "speckit-pro/.codex-plugin/plugin.json"
      - "speckit-pro/README.md"
      - "speckit-pro/**/README.md"
      - "speckit-pro/codex-hooks.json"
      - "speckit-pro/skills/**"
      - "speckit-pro/codex-skills/**"
      - "speckit-pro/agents/**"
      - "speckit-pro/codex-agents/**"
      - "speckit-pro/hooks/**"
      - "speckit-pro/scripts/**"
      - "tests/speckit-pro/**"
      - "!tests/speckit-pro/**/fixtures/**"
      - "!tests/speckit-pro/**/fixtures-codex/**"
      - "!tests/speckit-pro/layer7-integration/dispatch-fixtures/**"
      - "!tests/speckit-pro/layer7-integration/return-format-fixtures/**"
      - "!tests/speckit-pro/layer7-integration/e2e-fixtures/**"
      - "!tests/speckit-pro/layer7-integration/test-fixtures/**"
      - "!tests/speckit-pro/layer8-parity/**"
      - "dist/claude/speckit-pro/**"
      - "dist/codex/speckit-pro/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'deploy-docs-github-pages' || format('deploy-docs-noop-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Validate and upload docs artifact
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

      - name: Install docs-site dependencies
        run: pnpm --dir docs-site install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --dir docs-site exec playwright install --with-deps chromium

      - name: Validate docs-site
        run: |
          set -euo pipefail
          rm -rf docs-site/dist
          pnpm --dir docs-site validate
          if [ ! -d docs-site/dist ] || [ -z "$(find docs-site/dist -mindepth 1 -print -quit)" ]; then
            echo "::error::docs-site/dist is missing or empty after validation."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs-site/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
