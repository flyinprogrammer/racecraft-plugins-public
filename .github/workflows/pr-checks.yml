# PR Checks — runs plugin test suites and validates PR metadata.
#
# Triggers on pull requests targeting any branch. Draft PRs are skipped.
# Release automation can also dispatch the same checks for release-please PRs
# created or updated with GITHUB_TOKEN, because those pull_request events are
# suppressed by GitHub's recursive workflow guard.
# Only plugins whose files changed (relative to the base branch) are tested.
# PR titles must follow Conventional Commits format.
#
# Security notes:
# - TITLE and BASE_REF are passed via env vars, never directly interpolated
#   in run: blocks, preventing script injection (FR-013 pattern).
# - matrix.plugin is safe for direct interpolation because plugin directory
#   names are constrained to kebab-case by Constitution Principle I.

name: PR Checks
run-name: "PR Checks #${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}"

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to validate
        required: true
        type: string
      pr_title:
        description: Pull request title to validate
        required: true
        type: string
      base_ref:
        description: Base branch for changed-file detection
        required: true
        type: string
        default: main

# Top-level: no permissions granted by default.
# Each job declares only what it needs (principle of least privilege).
permissions: {}

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────────────
# Job 1: Detect which plugin directories have changed
# ─────────────────────────────────────────────────────────────────────
jobs:
  detect:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    permissions:
      contents: read
    outputs:
      plugins: ${{ steps.changed.outputs.plugins }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed plugin directories
        id: changed
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || inputs.base_ref }}
        run: |
          set -euo pipefail

          # All files changed relative to the base branch.
          changed_files=$(git diff --name-only "origin/${BASE_REF}...HEAD")

          # A plugin counts as "changed" if its source directory, generated
          # payload directory, out-of-plugin test directory, marketplace entry,
          # or shared packaging automation changed. The test suite lives at
          # repo-root tests/<plugin>/ so it is NOT shipped to consumers — but
          # test-only changes must still trigger that plugin's matrix job.
          # Plugin directory names are kebab-case (Constitution Principle I), safe for regex.
          plugins=()
          for manifest in */.claude-plugin/plugin.json; do
            [ -e "$manifest" ] || continue
            dir="${manifest%%/.claude-plugin/plugin.json}"
            if printf '%s\n' "$changed_files" | grep -qE "^(${dir}|tests/${dir}|dist/(claude|codex)/${dir})/|^\\.claude-plugin/marketplace\\.json$|^\\.agents/plugins/marketplace\\.json$|^scripts/(build-plugin-payloads|sync-marketplace-versions)\\.sh$|^release-please-config\\.json$|^\\.github/workflows/(pr-checks|release|deploy-docs)\\.yml$"; then
              plugins+=("$dir")
            fi
          done

          # Build a JSON array from the matched directories (jq handles escaping).
          if [ ${#plugins[@]} -gt 0 ]; then
            json_array=$(printf '%s\n' "${plugins[@]}" | jq -R -s -c 'split("\n") | map(select(. != ""))')
            echo "Changed plugin directories: ${json_array}"
          else
            json_array='[]'
            echo "No plugin directories changed in this PR. Test job will be skipped."
          fi

          echo "plugins=${json_array}" >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────
  # Job 2: Run plugin test suites (matrix over changed plugins)
  # ───────────────────────────────────────────────────────────────────
  test:
    name: "test (${{ matrix.plugin }})"
    runs-on: ubuntu-latest
    if: needs.detect.result == 'success' && needs.detect.outputs.plugins != '[]'
    needs: [detect]
    permissions:
      contents: read
    strategy:
      matrix:
        plugin: ${{ fromJSON(needs.detect.outputs.plugins) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Report test toolchain
        env:
          PLUGIN: ${{ matrix.plugin }}
        run: |
          set -euo pipefail
          checker="tests/${PLUGIN}/check-toolchain.sh"
          if [ -f "$checker" ]; then
            bash "$checker" --mode tests
          else
            echo "No toolchain checker found for ${PLUGIN}; continuing."
          fi

      - name: Run test suite
        env:
          PLUGIN: ${{ matrix.plugin }}
          SPECKIT_SKIP_TOOLCHAIN_CHECK: "1"
        run: |
          set -euo pipefail

          # The test suite lives at repo-root tests/<plugin>/ (outside the plugin
          # dir, so it is not shipped to consumers). Run it from the repo root;
          # run-all.sh self-locates the plugin it validates.
          runner="tests/${PLUGIN}/run-all.sh"
          if [ ! -f "$runner" ]; then
            echo "::error::Missing test runner: ${runner}"
            echo "Plugin '${PLUGIN}' is missing the required test runner at '${runner}'."
            echo "Every plugin must include tests/<plugin>/run-all.sh."
            exit 2
          fi

          bash "$runner"

  # ───────────────────────────────────────────────────────────────────
  # Job 2b: Run speckit-pro against the latest upstream jq release.
  # The runner image jq can lag behind Homebrew/latest-release behavior, so
  # this leg catches parser/regression drift before maintainers discover it
  # locally on newer toolchains.
  # ───────────────────────────────────────────────────────────────────
  test-latest-jq:
    name: test latest jq (speckit-pro)
    runs-on: ubuntu-latest
    if: needs.detect.result == 'success' && contains(needs.detect.outputs.plugins, 'speckit-pro')
    needs: [detect]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install latest jq release
        run: |
          set -euo pipefail

          jq_metadata="$(
            python3 - <<'PY'
          import json
          import sys
          from urllib.request import Request, urlopen

          request = Request(
              "https://api.github.com/repos/jqlang/jq/releases/latest",
              headers={"Accept": "application/vnd.github+json"},
          )
          with urlopen(request, timeout=30) as response:
              release = json.load(response)

          for asset in release.get("assets", []):
              if asset.get("name") == "jq-linux-amd64":
                  digest = asset.get("digest", "")
                  if not digest.startswith("sha256:"):
                      print("latest jq release asset is missing a sha256 digest", file=sys.stderr)
                      sys.exit(1)
                  print(asset["browser_download_url"])
                  print(digest.split(":", 1)[1])
                  break
          else:
              print("latest jq release did not include jq-linux-amd64", file=sys.stderr)
              sys.exit(1)
          PY
          )"

          jq_url="$(printf '%s\n' "$jq_metadata" | sed -n '1p')"
          jq_sha256="$(printf '%s\n' "$jq_metadata" | sed -n '2p')"
          curl -fsSL "$jq_url" -o "${RUNNER_TEMP}/jq"
          printf '%s  %s\n' "$jq_sha256" "${RUNNER_TEMP}/jq" | sha256sum -c -
          chmod 0755 "${RUNNER_TEMP}/jq"
          echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"

      - name: Report latest-jq toolchain
        run: |
          set -euo pipefail
          jq --version
          bash tests/speckit-pro/check-toolchain.sh --mode tests

      - name: Run speckit-pro suite with latest jq
        env:
          SPECKIT_SKIP_TOOLCHAIN_CHECK: "1"
        run: bash tests/speckit-pro/run-all.sh

  # ───────────────────────────────────────────────────────────────────
  # Job 3: Validate PR title against Conventional Commits format
  # ───────────────────────────────────────────────────────────────────
  validate-pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    permissions: {}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check PR title and split workflow contract
        env:
          TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || inputs.pr_title }}
          BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || inputs.base_ref }}
        run: |
          set -euo pipefail

          git diff --name-only "origin/${BASE_REF}...HEAD" > .git/pr-changed-files.txt
          speckit-pro/skills/speckit-autopilot/scripts/validate-pr-workflow-contract.sh \
            --title "$TITLE" \
            --changed-files .git/pr-changed-files.txt

  # ───────────────────────────────────────────────────────────────────
  # Job 4: Validate GitHub Actions workflow syntax and semantics
  # ───────────────────────────────────────────────────────────────────
  validate-workflows:
    name: validate-workflows
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          archive_path="${tmp_dir}/${archive}"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}" -o "$archive_path"

          checksum_file="${tmp_dir}/checksums.txt"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$archive_path" > "$checksum_file"
          sha256sum -c "$checksum_file"

          tar -xzf "$archive_path" -C "$tmp_dir" actionlint
          install -m 0755 "${tmp_dir}/actionlint" "${RUNNER_TEMP}/actionlint"

      - name: Run actionlint
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/actionlint" .github/workflows/*.yml

  # ───────────────────────────────────────────────────────────────────
  # Job 5: Validate docs-site and generated reference surfaces
  # ───────────────────────────────────────────────────────────────────
  validate-docs:
    name: validate-docs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect docs validation surfaces
        id: docs
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || inputs.base_ref }}
        run: |
          set -euo pipefail

          # All files changed relative to the base branch.
          changed_files=$(git diff --name-only "origin/${BASE_REF}...HEAD")

          path_is_under() {
            local file="$1"
            local directory="$2"
            [[ "$file" == "$directory"/* ]]
          }

          # DOC-010 changed-file surfaces:
          # - Rendered docs-site: docs-site/** -> full validate.
          # - Generated-reference source: plugin manifests, skills, agents,
          #   hooks, scripts, README, tests, dist manifests, and source allowlists
          #   -> reference drift plus docs-quality validation.
          # - Docs-validation contract: docs-site scripts, package scripts,
          #   Playwright config/spec, PR Checks docs-gate logic, docs deploy
          #   workflow, and release workflow -> full validate.
          # - Plugin-only changes outside those inputs keep the existing plugin
          #   matrix semantics and skip docs validation successfully.
          rendered_docs=false
          generated_reference=false
          docs_contract=false

          while IFS= read -r file; do
            [ -n "$file" ] || continue

            if path_is_under "$file" "docs-site"; then
              rendered_docs=true
            fi

            case "$file" in
              */.claude-plugin/plugin.json|*/.codex-plugin/plugin.json|.claude-plugin/marketplace.json|.agents/plugins/marketplace.json)
                generated_reference=true
                ;;
              speckit-pro/codex-hooks.json|README.md|*/README.md)
                generated_reference=true
                ;;
              .specify/integrations/*|docs/prd-interactive-documentation.md|docs/roadmap-interactive-documentation.md|release-please-config.json|.release-please-manifest.json)
                generated_reference=true
                ;;
            esac

            if path_is_under "$file" "speckit-pro/skills" \
              || path_is_under "$file" "speckit-pro/codex-skills" \
              || path_is_under "$file" "speckit-pro/agents" \
              || path_is_under "$file" "speckit-pro/codex-agents" \
              || path_is_under "$file" "speckit-pro/hooks" \
              || path_is_under "$file" "speckit-pro/scripts" \
              || path_is_under "$file" "scripts" \
              || path_is_under "$file" "tests/speckit-pro" \
              || path_is_under "$file" "dist/claude" \
              || path_is_under "$file" "dist/codex"; then
              generated_reference=true
            fi

            if path_is_under "$file" "docs-site/scripts" \
              || [[ "$file" == "docs-site/src/data/safe-install-aids.ts" ]] \
              || [[ "$file" == "docs-site/package.json" ]] \
              || [[ "$file" == "docs-site/playwright.config.mjs" ]] \
              || [[ "$file" == "docs-site/tests/docs-smoke.spec.mjs" ]] \
              || [[ "$file" == ".github/workflows/pr-checks.yml" ]] \
              || [[ "$file" == ".github/workflows/deploy-docs.yml" ]] \
              || [[ "$file" == ".github/workflows/release.yml" ]]; then
              docs_contract=true
            fi
          done <<< "$changed_files"

          should_validate_docs=false
          validation_mode=skip
          if [[ "$rendered_docs" == "true" || "$docs_contract" == "true" ]]; then
            should_validate_docs=true
            validation_mode=full
          elif [[ "$generated_reference" == "true" ]]; then
            should_validate_docs=true
            validation_mode=reference
          fi

          echo "Rendered docs-site changed: ${rendered_docs}"
          echo "Generated-reference source changed: ${generated_reference}"
          echo "Docs-validation contract changed: ${docs_contract}"
          echo "Docs validation mode: ${validation_mode}"
          if [[ "$should_validate_docs" == "false" ]]; then
            echo "No DOC-010 docs validation surfaces changed; validate-docs skipped successfully."
          fi

          {
            echo "should_validate_docs=${should_validate_docs}"
            echo "validation_mode=${validation_mode}"
            echo "rendered_docs=${rendered_docs}"
            echo "generated_reference=${generated_reference}"
            echo "docs_contract=${docs_contract}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.docs.outputs.should_validate_docs == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Enable pnpm
        if: steps.docs.outputs.should_validate_docs == 'true'
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

      - name: Install docs-site dependencies
        if: steps.docs.outputs.should_validate_docs == 'true'
        run: pnpm --dir docs-site install --frozen-lockfile

      - name: Report docs toolchain
        if: steps.docs.outputs.should_validate_docs == 'true'
        run: bash tests/speckit-pro/check-toolchain.sh --mode docs

      - name: Install Playwright browsers
        if: steps.docs.outputs.validation_mode == 'full'
        run: pnpm --dir docs-site exec playwright install --with-deps chromium

      - name: Run full docs validation
        if: steps.docs.outputs.validation_mode == 'full'
        env:
          DOCS_SITE_SMOKE_ARTIFACT_DIR: ${{ runner.temp }}/docs-site-smoke-evidence
        run: pnpm --dir docs-site validate

      - name: Upload docs-site smoke evidence
        if: always() && steps.docs.outputs.validation_mode == 'full'
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-smoke-evidence
          path: ${{ runner.temp }}/docs-site-smoke-evidence
          if-no-files-found: ignore
          retention-days: 7

      - name: Run generated-reference docs validation
        if: steps.docs.outputs.validation_mode == 'reference'
        run: |
          set -euo pipefail

          pnpm --dir docs-site reference:check
          pnpm --dir docs-site validate:quality

  # ───────────────────────────────────────────────────────────────────
  # Job 6: Sentinel aggregator — provides stable check name for branch
  #         protection. Passes if test matrix passed or was skipped.
  # ───────────────────────────────────────────────────────────────────
  validate-plugins:
    name: validate-plugins
    runs-on: ubuntu-latest
    if: always()
    needs: [detect, test, test-latest-jq]
    permissions: {}

    steps:
      - name: Check plugin test results
        run: |
          set -euo pipefail
          detect_result="${{ needs.detect.result }}"
          test_result="${{ needs.test.result }}"
          latest_jq_result="${{ needs.test-latest-jq.result }}"
          # detect failure or cancellation means the workflow itself is broken — fail the sentinel
          if [[ "$detect_result" == "failure" || "$detect_result" == "cancelled" ]]; then
            echo "::error::Detect job did not succeed (result: ${detect_result}). Workflow is broken."
            exit 1
          fi
          if [[ "$test_result" == "success" || "$test_result" == "skipped" ]]; then
            :
          else
            echo "::error::Plugin tests failed or were cancelled (result: ${test_result})."
            exit 1
          fi
          if [[ "$latest_jq_result" == "success" || "$latest_jq_result" == "skipped" ]]; then
            :
          else
            echo "::error::Latest jq tests failed or were cancelled (result: ${latest_jq_result})."
            exit 1
          fi
          echo "Plugin tests passed or were skipped (result: ${test_result}); latest-jq tests passed or were skipped (result: ${latest_jq_result})."
